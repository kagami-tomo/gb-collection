<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=2.0">
<title>GB コレクション管理</title>
<style>
:root {
  --ink:  #1e1e1e;
  --paper: #ffffff;
  --screen: #3a7bd5;
  --dark: #2c2c3a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
  font-size: 11px;
  min-height: 100vh;
}

/* ── ヘッダー ── */
header {
  background: #2c2c3a;
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}
.hdr-top {
  background: #23232f;
  padding: 5px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #aaa;
  white-space: nowrap;
}
.stat-item strong { color: #fff; font-size: 13px; }
.progress-wrap { display: flex; align-items: center; gap: 8px; }
.progress-bg {
  width: 160px; height: 6px; background: #444; border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: #3a7bd5; border-radius: 3px;
  transition: width .4s ease;
}
.pct-label { font-size: 12px; color: #fff; font-weight: 700; min-width: 36px; }
.hdr-bottom {
  padding: 0 20px;
  height: 46px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo {
  font-family: monospace;
  font-size: 18px;
  letter-spacing: 3px;
  color: #fff;
  white-space: nowrap;
}
.hdr-btns { margin-left: auto; display: flex; gap: 6px; }

/* ── コントロール ── */
.controls {
  background: #f0f0f5;
  border-bottom: 1px solid #ddd;
  padding: 6px 12px;
  position: sticky;
  top: 74px;
  z-index: 99;
}
.ctrl-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  padding: 3px 0;
}
.ctrl-group {
  display: flex;
  align-items: center;
  gap: 4px;
}
.ctrl-label {
  font-size: 11px;
  color: #666;
  white-space: nowrap;
}
.ctrl-input, .ctrl-select {
  background: #fff;
  border: 1px solid #ccc;
  color: #333;
  padding: 4px 6px;
  border-radius: 4px;
  font-size: 12px;
  outline: none;
  font-family: inherit;
}
.ctrl-input { width: 120px; }
.ctrl-input::placeholder { color: #bbb; }
.ctrl-input:focus, .ctrl-select:focus { border-color: #3a7bd5; box-shadow: 0 0 0 2px rgba(58,123,213,.15); }
.ctrl-select option { background: #fff; color: #333; }
.ctrl-select-sm { width: 70px; }
.ctrl-select-md { width: 160px; }

.apply-btn {
  background: #3a7bd5;
  border: none;
  color: #fff;
  padding: 5px 14px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
}
.apply-btn:hover { background: #2a6bc5; }
.cancel-btn {
  background: #e0e0e0;
  border: none;
  color: #555;
  padding: 5px 14px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
}
.cancel-btn:hover { background: #ccc; }

/* ── サブバー ── */
.sub-bar {
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  padding: 5px 20px;
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: #888;
  align-items: center;
  flex-wrap: wrap;
}
.sub-bar strong { color: #3a7bd5; }

/* ── 凡例 ── */
.legend-bar {
  padding: 6px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  background: #fafafa;
  border-bottom: 1px solid #e8e8e8;
  font-size: 11px;
  color: #666;
}
.leg { display: flex; align-items: center; gap: 4px; }
.leg-dot { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; }
.hint { margin-left: auto; font-size: 10px; color: #999; }

/* ── テーブル ── */
.table-wrap {
  overflow-x: auto;
  overflow-y: auto;
  height: calc(100vh - 28px - 46px - 68px);
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead tr {
  background: #2c2c3a;
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 98;
}
thead th {
  padding: 5px 6px;
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .5px;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  border-right: 1px solid #444;
}
thead th:last-child { border-right: none; }
thead th:hover { background: #3a3a4e; }
thead th.asc::after  { content: ' ▲'; font-size: 8px; color: #3a7bd5; }
thead th.desc::after { content: ' ▼'; font-size: 8px; color: #3a7bd5; }

tbody tr {
  border-bottom: 1px solid #eee;
  transition: background .1s;
}
tbody tr:nth-child(even) { background: #fafafa; }
tbody tr:hover { background: #eef4ff; }

td { padding: 5px 6px; vertical-align: middle; }

.td-no     { color: #aaa; font-size: 11px; width: 36px; }
.td-title  { font-weight: 600; min-width: 120px; }
.td-date-sub { font-size: 9px; color: #999; font-weight: 400; }
.td-dot    { text-align: center; width: 52px; }
.td-status { text-align: center; width: 86px; }

/* ── ジャンルバッジ ── */
.badge {
  display: inline-block;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .5px;
}
.g-ACT { background: #d35400; color: #fff; }
.g-RPG { background: #8e44ad; color: #fff; }
.g-PZL { background: #2980b9; color: #fff; }
.g-STG { background: #c0392b; color: #fff; }
.g-SPT { background: #16a085; color: #fff; }
.g-RAC { background: #f39c12; color: #000; }
.g-SLG { background: #27ae60; color: #fff; }
.g-TBL { background: #2c3e50; color: #fff; }
.g-FTG { background: #e74c3c; color: #fff; }
.g-ADV, .g-AVG { background: #7f8c8d; color: #fff; }
.g-ETC, .g-x   { background: #bdc3c7; color: #333; }

/* ── 機種バッジ ── */
.mach {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 2px;
  font-size: 10px;
  font-family: monospace;
}
.m-M     { background: #e8eaf6; color: #3949ab; border: 1px solid #9fa8da; }  /* モノ */
.m-Conly { background: #fce4ec; color: #c62828; border: 1px solid #ef9a9a; }  /* カラー専用 */
.m-Cboth { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }  /* 共通 */

/* ── 所持ステータスボタン ── */
.st-btn {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  transition: filter .15s, transform .1s;
  min-width: 52px;
  text-align: center;
  border: 1px solid transparent;
}
.st-btn:hover { filter: brightness(1.15); transform: scale(1.05); }
.st-0  { background: #e8e8e8; color: #999; border-color: #ccc; }       /* 未所持 */
.st-1  { background: #42b883; color: #fff; border-color: #33a06f; }    /* 1本 */
.st-2  { background: #4a9fd4; color: #fff; border-color: #3a8ab9; }    /* 2本 */
.st-3  { background: #5b7fcb; color: #fff; border-color: #4a6ab5; }    /* 3本+ */
.st-p  { background: #f0a030; color: #fff; border-color: #d08a20; }    /* 購入未定△ */
.st-x  { background: #c0392b; color: #fff; border-color: #a02020; }    /* 購入不可- */

/* ── NP/SGBタグ ── */
.tag-np {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  background: #e3f2fd;
  color: #1565c0;
  border: 1px solid #90caf9;
  margin: 1px;
}
.tag-sg {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  background: #fce4ec;
  color: #c62828;
  border: 1px solid #ef9a9a;
  margin: 1px;
}

.empty { text-align: center; padding: 60px; color: #aaa; font-size: 14px; }
.tr-jump { background: #fff9c4 !important; border-left: 3px solid #f0a030; }

/* ── 検索メニュー ── */
.search-menu {
  position: fixed;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.15);
  z-index: 999;
  overflow: hidden;
  min-width: 200px;
}
.search-menu-title {
  background: #2c2c3a;
  color: #fff;
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 700;
}
.search-menu-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  font-size: 13px;
  cursor: pointer;
  border-bottom: 1px solid #f0f0f0;
  text-decoration: none;
  color: #333;
}
.search-menu-item:last-child { border-bottom: none; }
.search-menu-item:hover { background: #f4f8ff; }
.search-menu-overlay {
  position: fixed;
  inset: 0;
  z-index: 998;
}

.hdr-btn {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.3);
  color: #fff;
  padding: 5px 11px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
}
.hdr-btn:hover { background: rgba(255,255,255,.22); }
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div class="stat-item">所持 <strong id="ownedNum">-</strong> / <span id="totalNum">-</span> 本</div>
    <div class="progress-wrap">
      <div class="progress-bg"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
      <div class="pct-label" id="pct">0%</div>
    </div>
  </div>
  <div class="hdr-bottom">
    <div class="logo">◀ GB LIST</div>
    <div class="hdr-btns">
      <button class="hdr-btn" id="installBtn" onclick="installApp()" style="display:none">📲 インストール</button>
      <button class="hdr-btn" onclick="exportJSON()">💾 エクスポート</button>
      <label class="hdr-btn" style="cursor:pointer">
        📂 インポート
        <input type="file" accept=".json" onchange="importJSON(event)" style="display:none">
      </label>
    </div>
  </div>
</header>

<div class="controls">
  <div class="ctrl-row">
    <div class="ctrl-group">
      <span class="ctrl-label">検索</span>
      <input class="ctrl-input" id="q" type="text" placeholder="タイトル・メーカー…" oninput="filter()">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">ジャンル</span>
      <select class="ctrl-select ctrl-select-sm" id="fGenre" onchange="filter()"><option value="">すべて</option></select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">所持</span>
      <select class="ctrl-select ctrl-select-sm" id="fStatus" onchange="filter()">
        <option value="">すべて</option>
        <option value="owned">所持あり</option>
        <option value="none">未所持</option>
        <option value="1">1本</option>
        <option value="2+">2本以上</option>
        <option value="△">購入未定</option>
        <option value="-">購入不可</option>
      </select>
    </div>
  </div>
  <div class="ctrl-row">
    <div class="ctrl-group">
      <span class="ctrl-label">メーカー</span>
      <select class="ctrl-select ctrl-select-md" id="fMaker" onchange="filter()"><option value="">すべて</option></select>
    </div>
    <button class="apply-btn" id="applyBtn" onclick="applyChanges()" style="display:none">✔ 適用</button>
    <button class="cancel-btn" id="cancelBtn" onclick="cancelChanges()" style="display:none">✕ キャンセル</button>
  </div>
</div>

<div class="sub-bar" id="subBar">
  表示中 <strong id="shownNum">-</strong> 件 ／ うち所持（1本以上） <strong id="shownOwned">-</strong> 件
</div>

<div class="legend-bar">
  <div class="leg"><div class="leg-dot" style="background:#e8e8e8;border:1px solid #ccc"></div>未所持</div>
  <div class="leg"><div class="leg-dot" style="background:#42b883"></div>1本所持</div>
  <div class="leg"><div class="leg-dot" style="background:#4a9fd4"></div>2本所持</div>
  <div class="leg"><div class="leg-dot" style="background:#5b7fcb"></div>3本以上</div>
  <div class="leg"><div class="leg-dot" style="background:#f0a030"></div>購入未定(△)</div>
  <div class="leg"><div class="leg-dot" style="background:#c0392b"></div>購入不可(-)</div>
  <div class="leg"><span class="tag-np">NP</span>任天堂パワー対応</div>
  <div class="leg"><span class="tag-sg">SGB</span>スーパーゲームボーイ対応</div>
  <div class="hint">所持状態はクリックで変更</div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('ar')">所持</th>
        <th onclick="sortBy('no')">No</th>
        <th onclick="sortBy('ti')">タイトル</th>
        <th onclick="sortBy('ge')">ジャンル</th>
        <th onclick="sortBy('mk')">メーカー</th>
        <th onclick="sortBy('tp')">機種</th>
        <th>NP/SGB</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">該当なし</div>
</div>

async function decompressData(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const w = ds.writable.getWriter();
  w.write(bytes); w.close();
  const r = ds.readable.getReader();
  const chunks = [];
  while (true) { const {done,value} = await r.read(); if (done) break; chunks.push(value); }
  const total = chunks.reduce((s,c)=>s+c.length,0);
  const out = new Uint8Array(total);
  let pos = 0;
  for (const c of chunks) { out.set(c,pos); pos+=c.length; }
  return JSON.parse(new TextDecoder().decode(out));
}

const LS_KEY = 'gb_overrides';

// localStorage から読み込み、なければ空オブジェクト
let overrides = {};
try {
  const saved = localStorage.getItem(LS_KEY);
  if (saved) overrides = JSON.parse(saved);
} catch(e) {}

// 未適用の変更を一時保管
let pending = {};

function saveOverrides() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(overrides)); } catch(e) {}
}

// ── エクスポート ──────────────────────────────────────────
function exportJSON() {
  const data = { exported: new Date().toISOString(), overrides };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gb_collection_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── インポート ──────────────────────────────────────────
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      // { overrides: {...} } 形式 または直接 {...} 形式どちらも受け付ける
      const loaded = data.overrides || data;
      if (typeof loaded !== 'object') throw new Error('不正なフォーマット');
      overrides = loaded;
      saveOverrides();
      updateHeaderStats();
      filter();
      alert(`インポート完了（${Object.keys(overrides).length} 件の変更を読み込みました）`);
    } catch(err) {
      alert('インポート失敗: ' + err.message);
    }
    event.target.value = ''; // 同じファイルを再度選べるようリセット
  };
  reader.readAsText(file);
}

const MAKER_FIX = {
  'J・ウイング':              'Jウィング',
  'やのまんゲームズ':          'やのまん',
  'タムソフト':               'タム',
  'MTO':                    'エム・ティー・オー',
  'UBIソフト':               'ユービーアイソフト',
  'メヒアファクトリー':         'メディアファクトリー',
  'ビクターインタラクティブソフトウェア ': 'ビクターインタラクティブソフトウェア',
  'EAV':                    'EAビクター',
};

function getMaker(r) {
  const mk = r.mk || '';
  return MAKER_FIX[mk] || mk;
}

function getField(r, key) {
  return (CORRECTIONS[r.no] && CORRECTIONS[r.no][key]) || r[key] || '';
}

let sortKey = 'no', sortAsc = true;

function getStatus(r) {
  if (pending[r.no] !== undefined) return pending[r.no];
  return overrides[r.no] !== undefined ? overrides[r.no] : (r.ar || '');
}

function filter() {
  const q  = document.getElementById('q').value.toLowerCase().trim();
  const fg = document.getElementById('fGenre').value;
  const fs = document.getElementById('fStatus').value;
  const fm = document.getElementById('fMaker').value;

  let rows = ALL_DATA.filter(r => {
    if (EXCLUDE.has(r.no)) return false;
    if (q  && !(r.ti||'').toLowerCase().includes(q) && !getMaker(r).toLowerCase().includes(q)) return false;
    if (fg && getField(r, 'ge').trim() !== fg) return false;
    if (fm && getMaker(r) !== fm) return false;
    const st = getStatus(r);
    if (fs === 'owned' && !['1','2','3','4','5'].includes(st)) return false;
    if (fs === 'none'  && st !== '') return false;
    if (fs === '1'     && st !== '1') return false;
    if (fs === '2+'    && !['2','3','4','5'].includes(st)) return false;
    if (fs === '△'    && st !== '△') return false;
    if (fs === '-'     && st !== '-') return false;
    return true;
  });

  rows.sort((a, b) => {
    let av = sortKey === 'ar' ? getStatus(a) : (a[sortKey] || '');
    let bv = sortKey === 'ar' ? getStatus(b) : (b[sortKey] || '');
    if (['no'].includes(sortKey)) { av = parseInt(av)||0; bv = parseInt(bv)||0; }
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ?  1 : -1;
    return 0;
  });

  renderRows(rows);
  updateStats(rows);
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('asc','desc');
    if (th.getAttribute('onclick') === `sortBy('${key}')`) {
      th.classList.add(sortAsc ? 'asc' : 'desc');
    }
  });
  filter();
}

let jumpNo = null; // ジャンプ先No

function renderRows(rows) {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  if (!rows.length) {
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = rows.map(r => {
    const st  = getStatus(r);
    const sm  = ST[st] || ST[''];
    const ge  = getField(r, 'ge');
    const tp  = getField(r, 'tp');
    const gc  = GC[ge] || 'g-ETC';
    const mtpCls = tp === 'M' ? 'm-M' : tp === 'C専' ? 'm-Conly' : 'm-Cboth';
    const mtpLbl = tp === 'M' ? 'モノ' : tp === 'C専' ? 'カラー' : tp === 'C対' ? '共通' : '不明';
    const npDot = r.np === '○' ? '<span class="tag-np" title="任天堂パワー対応">NP</span>' : '';
    const sgDot = r.sg === '○' ? '<span class="tag-sg" title="スーパーゲームボーイ対応">SGB</span>' : '';
    const highlight = r.no === jumpNo ? ' class="tr-jump"' : '';

    return `<tr${highlight} id="row-${r.no}">
      <td class="td-status">
        <span class="st-btn ${sm.cls}" onclick="toggleStatus('${r.no}')">${sm.label}</span>
      </td>
      <td class="td-no" onclick="jumpToNo('${r.no}')" style="cursor:pointer;color:#3a7bd5">${r.no}</td>
      <td class="td-title" onclick="showSearchMenu(event,'${r.ti}')" style="cursor:pointer">${r.ti}<br><span class="td-date-sub">${r.dt}</span></td>
      <td><span class="badge ${gc}">${ge}</span></td>
      <td>${getMaker(r)}</td>
      <td><span class="mach ${mtpCls}">${mtpLbl}</span></td>
      <td class="td-dot">${npDot}${sgDot}</td>
    </tr>`;
  }).join('');

  // ジャンプ先にスクロール（table-wrap内でスクロール）
  if (jumpNo) {
    const el = document.getElementById(`row-${jumpNo}`);
    const wrap = document.querySelector('.table-wrap');
    if (el && wrap) {
      const elTop = el.offsetTop;
      const wrapH = wrap.clientHeight;
      wrap.scrollTop = elTop - wrapH / 2;
    }
    jumpNo = null;
  }
}

function jumpToNo(no) {
  document.getElementById('q').value = '';
  document.getElementById('fGenre').value = '';
  document.getElementById('fStatus').value = '';
  document.getElementById('fMaker').value = '';
  document.getElementById('applyBtn').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
  jumpNo = no;
  filter();
}

function toggleStatus(no) {
  const r = ALL_DATA.find(x => x.no === no);
  if (!r) return;
  const cur = getStatus(r);
  const idx = ST_CYCLE.indexOf(cur);
  pending[no] = ST_CYCLE[(idx === -1 ? 0 : idx + 1) % ST_CYCLE.length];
  updateHeaderStats();
  const btn = document.querySelector(`.st-btn[onclick="toggleStatus('${no}')"]`);
  if (btn) {
    const st = getStatus(r);
    const sm = ST[st] || ST[''];
    btn.className = `st-btn ${sm.cls}`;
    btn.textContent = sm.label;
  }
  // 常に適用・キャンセルボタンを表示
  document.getElementById('applyBtn').style.display = 'inline-block';
  document.getElementById('cancelBtn').style.display = 'inline-block';
}

function applyChanges() {
  Object.assign(overrides, pending);
  pending = {};
  saveOverrides();
  document.getElementById('applyBtn').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
  filter();
}

function cancelChanges() {
  pending = {};
  updateHeaderStats();
  document.getElementById('applyBtn').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
  filter();
}

function updateStats(rows) {
  const owned = rows.filter(r => ['1','2','3','4','5'].includes(getStatus(r))).length;
  document.getElementById('shownNum').textContent   = rows.length;
  document.getElementById('shownOwned').textContent = owned;
}

function updateHeaderStats() {
  const total = ALL_DATA.length;
  const owned = ALL_DATA.filter(r => ['1','2','3','4','5'].includes(getStatus(r))).length;
  const pct   = total ? Math.round(owned / total * 100) : 0;
  document.getElementById('ownedNum').textContent = owned;
  document.getElementById('totalNum').textContent = total;
  document.getElementById('pbar').style.width     = pct + '%';
  document.getElementById('pct').textContent      = pct + '%';
}

async function init() {
  try {
    const data = await decompressData(B64_DATA);
    ALL_DATA.push(...data);
  } catch(e) { console.error('load error', e); }

  // ジャンル（?を除外）
  const genres = [...new Set(ALL_DATA.map(r => getField(r,'ge')).filter(g => g && g !== '?'))].sort();
  const gSel = document.getElementById('fGenre');
  genres.forEach(g => {
    const o = document.createElement('option');
    o.value = g; o.textContent = g; gSel.appendChild(o);
  });

  // メーカー（補正済み・重複除去・ソート）
  const makers = [...new Set(ALL_DATA.map(r => getMaker(r)).filter(Boolean))].sort((a,b) => a.localeCompare(b, 'ja'));
  const mSel = document.getElementById('fMaker');
  makers.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m; mSel.appendChild(o);
  });

  updateHeaderStats();
  filter();
}

init();

// ── 検索メニュー ─────────────────────────────────────────
function showSearchMenu(e, title) {
  e.stopPropagation();
  closeSearchMenu();

  const q = encodeURIComponent(title + ' ゲームボーイ');
  const qAmz = encodeURIComponent(title + ' ゲームボーイ');

  const items = [
    { icon: '🖼️', label: 'Google 画像検索', url: `https://www.google.com/search?tbm=isch&q=${q}` },
    { icon: '🔍', label: 'Google 検索',     url: `https://www.google.com/search?q=${q}` },
    { icon: '▶️', label: 'YouTube',          url: `https://www.youtube.com/results?search_query=${q}` },
    { icon: '🛒', label: 'Amazon',           url: `https://www.amazon.co.jp/s?k=${qAmz}` },
    { icon: '🏪', label: 'メルカリ',          url: `https://jp.mercari.com/search?keyword=${q}` },
    { icon: '🔨', label: 'ヤフオク',          url: `https://auctions.yahoo.co.jp/search/search?p=${q}` },
  ];

  // オーバーレイ
  const overlay = document.createElement('div');
  overlay.className = 'search-menu-overlay';
  overlay.onclick = closeSearchMenu;
  document.body.appendChild(overlay);

  // メニュー
  const menu = document.createElement('div');
  menu.className = 'search-menu';
  menu.id = 'searchMenu';
  menu.innerHTML = `
    <div class="search-menu-title">🔎 ${title}</div>
    ${items.map(it => `<a class="search-menu-item" href="${it.url}" target="_blank" onclick="closeSearchMenu()">${it.icon} ${it.label}</a>`).join('')}
  `;

  // 一旦非表示で追加してサイズ取得後に位置調整
  menu.style.visibility = 'hidden';
  document.body.appendChild(menu);

  requestAnimationFrame(() => {
    const menuH = menu.offsetHeight;
    const menuW = menu.offsetWidth;
    const margin = 8;
    let x = e.clientX;
    let y = e.clientY;
    // 右端補正
    if (x + menuW + margin > window.innerWidth) x = window.innerWidth - menuW - margin;
    // 下端補正：下に入らなければ上に表示
    if (y + menuH + margin > window.innerHeight) y = e.clientY - menuH;
    // 上端補正
    if (y < margin) y = margin;
    menu.style.left = Math.max(margin, x) + 'px';
    menu.style.top  = y + 'px';
    menu.style.visibility = 'visible';
  });
}

function closeSearchMenu() {
  document.getElementById('searchMenu')?.remove();
  document.querySelector('.search-menu-overlay')?.remove();
}

// Service Worker
const SW_CODE = `
const CACHE = 'gb-v1';
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      caches.open(CACHE).then(c => c.put(e.request, res.clone()));
      return res;
    }).catch(() => caches.match(e.request)))
  );
});
`;
if ('serviceWorker' in navigator) {
  const swBlob = new Blob([SW_CODE], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
}

// インストールボタン
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'inline-block';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBtn').style.display = 'none';
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
}
